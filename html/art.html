<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../css/main.css" type ="text/css"/>
    <link rel="stylesheet" href="../css/style.css" type ="text/css"/>
    <link rel="shortcut icon" type="image/x-icon" href="../assets/favicon.png" />
    <title>Dodgy Alleyway - Projects:Art</title>

    <script
        src="https://code.jquery.com/jquery-3.3.1.js"
        integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60="
        crossorigin="anonymous">
    </script>
    <script> 
        $(function(){
        $("#header").load("scripts/header.html"); 
        $("#footer").load("scripts/footer.html"); 
        });
    </script> 

</head>
<body>
    <div class="page-container">
        
        <div id="header"></div>  <!-- Header -->  

        <!-- -------------------------------------- -->

        <script src="scripts/modals.js"></script> <!-- Modal Script-->  

        <!-- Image Table -->
        <div class="row">
            <div class="column">
                <img src="../assets/art/thumbnails/Untitled-1.png" width="300" onclick="openModal0();currentSlide0(1)" class="hover-shadow">
            </div>
            <div class="column">
                <img src="../assets/art/thumbnails/Untitled-2.png" width="300" onclick="openModal1();currentSlide1(1)" class="hover-shadow">
            </div>
            <div class="column">
                <img src="../assets/art/thumbnails/Untitled-3.png" width="300" onclick="openModal();currentSlide(3)" class="hover-shadow"> <!--DEAD-->
            </div>
            <div class="column">
                <img src="../assets/art/thumbnails/Untitled-4.png" width="300" onclick="openModal();currentSlide(4)" class="hover-shadow"> <!--DEAD-->
            </div>
        </div>

        <!-- Modal 1 -->
        <div id="myModal0" class="modal">
            <span class="close cursor" onclick="closeModal0()">&times;</span>
            <div class="modal-content">

                <div class="mySlides0">
                <div class="numbertext">1 / 4</div>
                <img src="../assets/art/temp/img1.jpg" style="height:60vh;display: block;margin: auto;">
                </div>

                <div class="mySlides0">
                <div class="numbertext">2 / 4</div>
                <img src="../assets/art/temp/img2.jpg" style="height:60vh;display: block;margin: auto;">
                </div>

                <div class="mySlides0">
                <div class="numbertext">3 / 4</div>
                <img src="../assets/art/temp/img3.jpg" style="height:60vh;display: block;margin: auto;">
                </div>

                <div class="mySlides0">
                <div class="numbertext">4 / 4</div>
                <img src="../assets/art/temp/img4.jpg" style="height:60vh;display: block;margin: auto;">
                </div>

                <a class="prev" onclick="plusSlides0(-1)">&#10094;</a>
                <a class="next" onclick="plusSlides0(1)">&#10095;</a>

                <div class="caption-container">
                <p id="caption0"></p>
                </div>

                <div class="column">
                <img class="demo" src="../assets/art/temp/img1.jpg" width="100" onclick="currentSlide0(1)" alt="Test 1">
                </div>

                <div class="column">
                <img class="demo" src="../assets/art/temp/img2.jpg" width="100" onclick="currentSlide0(2)" alt="Test 2">
                </div>

                <div class="column">
                <img class="demo" src="../assets/art/temp/img3.jpg" width="100" onclick="currentSlide0(3)" alt="Test 3">
                </div>

                <div class="column">
                <img class="demo" src="../assets/art/temp/img4.jpg" width="100" onclick="currentSlide0(4)" alt="Test 4">
                </div>
            </div>
        </div>

        <!-- Modal 2 -->
        <div id="myModal1" class="modal">
            <span class="close cursor" onclick="closeModal1()">&times;</span>
            <div class="modal-content">

                <div class="mySlides1">
                <div class="numbertext">1 / 4</div>
                <img src="../assets/art/temp/img1.jpg" style="height:60vh;display: block;margin: auto;">
                </div>

                <div class="mySlides1">
                <div class="numbertext">2 / 4</div>
                <img src="../assets/art/temp/img2.jpg" style="height:60vh;display: block;margin: auto;">
                </div>

                <div class="mySlides1">
                <div class="numbertext">3 / 4</div>
                <img src="../assets/art/temp/img3.jpg" style="height:60vh;display: block;margin: auto;">
                </div>

                <div class="mySlides1">
                <div class="numbertext">4 / 4</div>
                <img src="../assets/art/temp/img4.jpg" style="height:60vh;display: block;margin: auto;">
                </div>

                <a class="prev" onclick="plusSlides1(-1)">&#10094;</a>
                <a class="next" onclick="plusSlides1(1)">&#10095;</a>

                <div class="caption-container">
                <p id="caption1"></p>
                </div>

                <div class="column">
                <img class="demo" src="../assets/art/temp/img1.jpg" width="100" onclick="currentSlide1(1)" alt="Test 1">
                </div>

                <div class="column">
                <img class="demo" src="../assets/art/temp/img2.jpg" width="100" onclick="currentSlide1(2)" alt="Test 2">
                </div>

                <div class="column">
                <img class="demo" src="../assets/art/temp/img3.jpg" width="100" onclick="currentSlide1(3)" alt="Test 3">
                </div>

                <div class="column">
                <img class="demo" src="../assets/art/temp/img4.jpg" width="100" onclick="currentSlide1(4)" alt="Test 4">
                </div>
            </div>
        </div>

        <!-- -------------------------------------- -->

    </div>

    <div id="footer"></div> <!-- Footer -->

</body>
</html>
