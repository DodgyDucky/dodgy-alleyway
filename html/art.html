<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../css/main.css" type ="text/css"/>
    <link rel="stylesheet" href="../css/style.css" type ="text/css"/>
    <link rel="shortcut icon" type="image/x-icon" href="../assets/favicon.png" />
    <title>Dodgy Alleyway - Projects:Art</title>

    <script
        src="https://code.jquery.com/jquery-3.3.1.js"
        integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60="
        crossorigin="anonymous">
    </script>
    <script> 
        $(function(){
        $("#header").load("scripts/header.html"); 
        $("#footer").load("scripts/footer.html"); 
        });
    </script> 

    <script src="scripts/modals.js"></script> <!-- Modal -->  

</head>
<body>
    <div class="page-container">
        
        <div id="header"></div>  <!-- Header -->  

        <!-- -------------------------------------- -->

        <!-- Images used to open the lightbox -->
        <div class="row">
            <div class="column">
                <img src="../assets/temp/img1.jpg" onclick="openModal();currentSlide(1)" class="hover-shadow">
            </div>
            <div class="column">
                <img src="../assets/temp/img2.jpg" onclick="openModal();currentSlide(2)" class="hover-shadow">
            </div>
            <div class="column">
                <img src="../assets/temp/img3.jpg" onclick="openModal();currentSlide(3)" class="hover-shadow">
            </div>
            <div class="column">
                <img src="../assets/temp/img4.jpg" onclick="openModal();currentSlide(4)" class="hover-shadow">
            </div>
        </div>

        <!-- The Modal/Lightbox -->
        <div id="myModal" class="modal">
            <span class="close cursor" onclick="closeModal()">&times;</span>
            <div class="modal-content">

                <div class="mySlides">
                <div class="numbertext">1 / 4</div>
                <img src="img1_wide.jpg" style="width:100%">
                </div>

                <div class="mySlides">
                <div class="numbertext">2 / 4</div>
                <img src="img2_wide.jpg" style="width:100%">
                </div>

                <div class="mySlides">
                <div class="numbertext">3 / 4</div>
                <img src="img3_wide.jpg" style="width:100%">
                </div>

                <div class="mySlides">
                <div class="numbertext">4 / 4</div>
                <img src="img4_wide.jpg" style="width:100%">
                </div>

                <!-- Next/previous controls -->
                <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
                <a class="next" onclick="plusSlides(1)">&#10095;</a>

                <!-- Caption text -->
                <div class="caption-container">
                <p id="caption"></p>
                </div>

                <!-- Thumbnail image controls -->
                <div class="column">
                <img class="demo" src="../assets/temp/img1.jpg" onclick="currentSlide(1)" alt="Nature">
                </div>

                <div class="column">
                <img class="demo" src="../assets/temp/img2.jpg" onclick="currentSlide(2)" alt="Snow">
                </div>

                <div class="column">
                <img class="demo" src="../assets/temp/img3.jpg" onclick="currentSlide(3)" alt="Mountains">
                </div>

                <div class="column">
                <img class="demo" src="../assets/temp/img4.jpg" onclick="currentSlide(4)" alt="Lights">
                </div>
            </div>
        </div>

        <!-- -------------------------------------- -->


    </div>

    <div id="footer"></div> <!-- Footer -->

</body>
</html>
